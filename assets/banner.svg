<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B1E54"/>
      <stop offset="50%" stop-color="#6A3EA1"/>
      <stop offset="100%" stop-color="#D4A5F5"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- decorative faint circles -->
  <circle cx="1080" cy="60" r="90" fill="#ffffff" opacity="0.05"/>
  <circle cx="1150" cy="220" r="60" fill="#ffffff" opacity="0.06"/>
  <circle cx="90" cy="250" r="70" fill="#ffffff" opacity="0.05"/>

  <!-- emotion emoji row -->
  <g font-size="42" font-family="Segoe UI Emoji, Apple Color Emoji, sans-serif">
    <text x="70" y="90" opacity="0.9">🙂</text>
    <text x="140" y="90" opacity="0.75">😠</text>
    <text x="210" y="90" opacity="0.75">😨</text>
    <text x="280" y="90" opacity="0.75">😢</text>
    <text x="350" y="90" opacity="0.75">😲</text>
    <text x="420" y="90" opacity="0.75">🤢</text>
    <text x="490" y="90" opacity="0.75">😐</text>
  </g>

  <!-- title -->
  <text x="70" y="175" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff">
    Emotion Detection AI
  </text>

  <!-- subtitle -->
  <text x="72" y="215" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#EADCF8">
    Transformer-powered emotion classification, from the command line
  </text>

  <!-- bottom tag row -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#EADCF8" opacity="0.9">
    <text x="72" y="255">🐍 Python</text>
    <text x="180" y="255">🤗 Transformers</text>
    <text x="330" y="255">💾 SQLite</text>
    <text x="430" y="255">🧪 Pytest</text>
  </g>
</svg>
